<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CUTOUT</title>

  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700,600&f[]=general-sans@400,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<section class="hero">

  <div class="hero-left">
    <h1 class="title">CUTOUT</h1>
    <p class="subtitle">Remove backgrounds in seconds</p>

    <!-- ✅ FIXED UPLOAD -->
    <div class="upload-box" id="uploadBox">
      <p>DROP IMAGE OR CLICK</p>
    </div>

    <!-- ✅ KEEP INPUT OUTSIDE -->
    <input type="file" id="fileInput" hidden>

    <div class="options">
      <button class="opt-btn">BLACK</button>
      <button class="opt-btn">WHITE</button>
      <button class="opt-btn">TRANSPARENT</button>
    </div>
  </div>

  <div class="hero-right">
    <h2>Built by Kartheek</h2>
    <p>
      Hey, Kartheek Akula here...
    </p>
  </div>

</section>

<section class="preview">
  <div class="card" id="original">Original</div>
  <div class="card" id="result">Result</div>
</section>

<section class="download">
  <button id="downloadBtn">DOWNLOAD IMAGE</button>
</section>

<footer class="footer">
  <p class="footer-text">Liked CUTOUT? Let’s connect 👇</p>

  <div class="socials">
    <a href="https://www.instagram.com/kartheekakulaa/" target="_blank">Instagram</a>
    <a href="https://www.linkedin.com/in/kartheek-akula-648082322/" target="_blank">LinkedIn</a>
  </div>
</footer>

<script src="script.js"></script>

</body>
</html>
